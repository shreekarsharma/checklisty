<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheckListy</title>
    <!-- FONTAWESOME ICON -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- TAILWIND CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header class="sticky top-0">
      <nav class="bg-sky-950 flex justify-center align-center py-3">
        <a href="index.html" class="text-white text-xl font-bold uppercase tracking-wider">
          CheckListy
        </a>
      </nav>
    </header>
    <main class="container mx-auto">
        <!-- NEW TASK INPUT -->
         <div class="flex justify-center items-center py-10  text-lg">
            <input type="text" placeholder="Add a new task" class="border-b-2 border-sky-700 px-2 py-1 outline-none focus:bg-sky-100 font-medium placeholder:text-sky-800 text-sky-800" id="new-task-input">
            <button class="cursor-pointer bg-sky-700 p-2 pb-3 flex justify-center items-center text-white hover:bg-sky-800" id="add-task-button"><i class="fa-solid fa-plus"></i></button>
         </div>
        <!-- TASKS LIST -->
         <div class="flex justify-center align-center">
            <ul id="task-list" class="w-full max-w-2xl h-96 mx-auto overflow-y-auto p-4">
            </ul>
         </div>
         <div class="flex align-center justify-center">
            <button id="delete-all-btn" class="hidden bg-red-600 py-1 px-2 text-white font-medium uppercase cursor-pointer rounded hover:bg-red-700" onclick="deleteAllTasks()"><i class="fa-solid fa-ban"></i> Delete All Tasks</button>
         </div>
    </main>
    <footer></footer>
    <script src="script.js"></script>
  </body>
</html>
